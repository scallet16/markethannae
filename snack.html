<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>분식점 주문·대기</title>
  <style>
    :root{--ink:#252525;--cream:#fff8e8;--yellow:#ffd84d;--green:#1f8a5b;--red:#d84c4c;--line:#e8dcc5}*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font-family:"Noto Sans KR",system-ui,sans-serif}button{font:inherit;cursor:pointer}header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;background:var(--ink);color:#fff}header h1{margin:0;font-size:clamp(22px,3vw,34px)}header span{color:var(--yellow);font-weight:800}.layout{display:grid;grid-template-columns:minmax(290px,.85fr) minmax(380px,1.15fr);gap:16px;padding:16px;min-height:calc(100vh - 76px)}.card{background:#fff;border:2px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 8px 22px #5c452018}.card h2{margin:0 0 14px}.student-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:9px}.student{border:2px solid var(--ink);border-radius:14px;background:#fff;padding:14px 8px;font-weight:900}.student.active{background:var(--yellow)}.empty{padding:28px 10px;text-align:center;color:#777}.paid-list,.queue{display:grid;gap:10px}.order{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;border:2px solid var(--line);border-radius:16px;padding:13px}.order b{display:block;font-size:18px}.order small{display:block;color:#777;margin-top:4px}.register,.call,.complete,.undo{border:0;border-radius:12px;padding:11px 14px;color:#fff;font-weight:900}.register{background:var(--green)}.queue-card{display:grid;grid-template-columns:64px 1fr auto;gap:12px;align-items:center;border:3px solid var(--ink);border-radius:18px;padding:14px;background:#fff}.number{display:grid;place-items:center;width:56px;height:56px;border-radius:50%;background:var(--yellow);font-size:25px;font-weight:1000}.actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}.call{background:#315fba}.complete{background:var(--green)}.undo{background:#7950a8}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}.notice{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);opacity:0;background:var(--ink);color:#fff;padding:12px 18px;border-radius:999px;font-weight:800;transition:.2s;pointer-events:none}.notice.show{opacity:1;transform:translate(-50%,0)}@media(max-width:800px){.layout{grid-template-columns:1fr}.queue-card{grid-template-columns:54px 1fr}.queue-card .actions{grid-column:1/-1}.actions button{flex:1}}
  </style>
</head>
<body>
  <header><h1>🍗 분식점 주문·대기</h1><span id="classLabel"></span></header>
  <main class="layout">
    <section class="card">
      <h2>1. 내 이름을 선택하세요</h2>
      <div class="student-grid" id="studentGrid"></div>
      <h2 id="paidTitle" style="margin-top:22px">2. 결제한 메뉴를 확인하세요</h2>
      <div class="paid-list" id="paidList"><div class="empty">이름을 선택해 주세요.</div></div>
    </section>
    <section class="card">
      <div class="toolbar"><h2>현재 대기 주문</h2><button class="undo" id="undoBtn" disabled>최근 완료 되돌리기</button></div>
      <div class="queue" id="queue"></div>
    </section>
  </main>
  <div class="notice" id="notice" role="status"></div>

  <script type="module">
    import { classId, completeWaiting, registerWaiting, subscribeSnack, undoLatestCompleted } from './firebase-snack.js';

    const studentGrid=document.querySelector('#studentGrid'),paidList=document.querySelector('#paidList'),paidTitle=document.querySelector('#paidTitle'),queue=document.querySelector('#queue'),undoBtn=document.querySelector('#undoBtn'),notice=document.querySelector('#notice');
    document.querySelector('#classLabel').textContent=`학급 ${classId}`;
    let state={purchases:[],waiting:[],completed:[]},selectedStudentId=null,busy=false;
    const esc=value=>{const div=document.createElement('div');div.textContent=value;return div.innerHTML};
    const date=value=>new Date(value).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const money=value=>Number(value).toLocaleString('ko-KR')+'원';
    function toast(message){notice.textContent=message;notice.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>notice.classList.remove('show'),2200)}
    function paidPurchases(){return state.purchases.filter(item=>item.status==='paid')}
    function render(){
      const paid=paidPurchases(),students=[...new Map(paid.map(item=>[String(item.studentId),item])).values()];
      if(selectedStudentId!==null&&!students.some(item=>String(item.studentId)===selectedStudentId))selectedStudentId=null;
      studentGrid.innerHTML=students.length?students.map(item=>`<button class="student${String(item.studentId)===selectedStudentId?' active':''}" data-student-id="${esc(String(item.studentId))}">${esc(item.studentName)}</button>`).join(''):'<div class="empty">대기 등록 가능한 결제 내역이 없습니다.</div>';
      const selected=paid.filter(item=>String(item.studentId)===selectedStudentId);
      paidTitle.textContent=selectedStudentId===null?'2. 결제한 메뉴를 확인하세요':`2. ${selected[0]?.studentName||''} 결제 메뉴`;
      paidList.innerHTML=selectedStudentId===null?'<div class="empty">이름을 선택해 주세요.</div>':selected.length?selected.map(item=>`<article class="order"><div><b>${esc(item.menuName)} × ${item.quantity}</b><small>${money(item.totalAmount)} · 결제 ${date(item.paidAt)}</small></div><button class="register" data-purchase-id="${esc(item.purchaseId)}">대기 등록</button></article>`).join(''):'<div class="empty">등록 가능한 결제 내역이 없습니다.</div>';
      queue.innerHTML=state.waiting.length?state.waiting.map((item,index)=>`<article class="queue-card"><div class="number">${index+1}</div><div><b>${esc(item.studentName)} · ${esc(item.menuName)} × ${item.quantity}</b><small>주문 ${date(item.registeredAt)}</small></div><div class="actions"><button class="call" data-call-id="${esc(item.purchaseId)}">호출</button><button class="complete" data-complete-id="${esc(item.purchaseId)}">전달 완료</button></div></article>`).join(''):'<div class="empty">현재 대기 중인 주문이 없습니다.</div>';
      undoBtn.disabled=!state.completed.length||busy;
    }
    function speak(item,index){if(!('speechSynthesis'in window)){toast('이 브라우저에서는 음성 호출을 지원하지 않습니다.');return}speechSynthesis.cancel();const utterance=new SpeechSynthesisUtterance(`${index+1}번 ${item.studentName} 학생, ${item.menuName} 주문이 준비되었습니다.`);utterance.lang='ko-KR';utterance.rate=.88;utterance.pitch=1;speechSynthesis.speak(utterance);toast(`${index+1}번 ${item.studentName} 학생을 호출했습니다.`)}
    studentGrid.addEventListener('click',event=>{const button=event.target.closest('[data-student-id]');if(!button)return;selectedStudentId=button.dataset.studentId;render()});
    paidList.addEventListener('click',async event=>{const button=event.target.closest('[data-purchase-id]');if(!button||busy)return;busy=true;button.disabled=true;try{const result=await registerWaiting(button.dataset.purchaseId);if(result.committed)toast('대기 등록이 완료되었습니다.');else toast(result.reason==='duplicate'?'이미 대기 등록된 주문입니다.':'대기 등록할 수 없는 주문입니다.')}catch(error){console.error(error);toast('Firebase 연결을 확인해 주세요.')}finally{busy=false;render()}});
    queue.addEventListener('click',async event=>{const call=event.target.closest('[data-call-id]'),complete=event.target.closest('[data-complete-id]');if(call){const index=state.waiting.findIndex(item=>item.purchaseId===call.dataset.callId);if(index>=0)speak(state.waiting[index],index);return}if(!complete||busy)return;busy=true;complete.disabled=true;try{const result=await completeWaiting(complete.dataset.completeId);toast(result.committed?'전달 완료 처리했습니다.':'이미 처리된 주문입니다.')}catch(error){console.error(error);toast('Firebase 연결을 확인해 주세요.')}finally{busy=false;render()}});
    undoBtn.addEventListener('click',async()=>{if(busy)return;busy=true;undoBtn.disabled=true;try{const result=await undoLatestCompleted();toast(result.committed?`${result.restored.studentName} 주문을 대기 목록으로 되돌렸습니다.`:'되돌릴 주문이 없습니다.')}catch(error){console.error(error);toast('Firebase 연결을 확인해 주세요.')}finally{busy=false;render()}});
    subscribeSnack(next=>{state=next;render()},error=>{console.error(error);toast('Firebase 연결을 확인해 주세요.')});
    render();
  </script>
</body>
</html>
