<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>키캡 만들기 부스</title>
  <style>
    :root{--ink:#252525;--purple:#7654c8;--yellow:#ffd84d;--cream:#fff9ec;--line:#ded5ef;--green:#198754}*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font-family:"Noto Sans KR",system-ui,sans-serif}button{font:inherit;cursor:pointer}header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;background:var(--purple);color:#fff}header h1{margin:0;font-size:clamp(23px,3vw,36px)}header span{font-weight:800;color:#fff4a8}.layout{display:grid;grid-template-columns:minmax(270px,.8fr) minmax(420px,1.2fr);gap:16px;padding:16px;min-height:calc(100vh - 78px)}.card{background:#fff;border:2px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 8px 24px #58428018}.card h2{margin:0 0 14px}.students{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:9px}.student{border:2px solid var(--ink);border-radius:14px;background:#fff;padding:13px 7px;font-weight:900}.student.active{background:var(--yellow)}.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0}.metric{border-radius:16px;background:#f5f0ff;padding:14px}.metric span{display:block;color:#685e78;font-size:13px}.metric strong{font-size:clamp(22px,3vw,34px)}.menu{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.product{border:3px solid var(--line);border-radius:18px;background:#fff;padding:18px 10px;font-weight:900;font-size:18px}.product span{display:block;font-size:38px;margin-bottom:5px}.product.selected{border-color:var(--purple);background:#f5f0ff}.buybar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:15px;padding-top:15px;border-top:2px solid var(--line)}.buy{border:0;border-radius:14px;background:var(--green);color:#fff;padding:14px 22px;font-weight:1000;font-size:18px}.buy:disabled{opacity:.4;cursor:not-allowed}.history{display:grid;gap:7px;max-height:220px;overflow:auto;margin-top:12px}.history div{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:7px 2px}.empty{text-align:center;color:#777;padding:24px 6px}dialog{border:0;border-radius:22px;padding:0;box-shadow:0 18px 55px #0005}dialog::backdrop{background:#0008}.modal{min-width:min(420px,88vw);padding:24px;text-align:center}.modal h2{margin-top:0}.modal p{font-size:20px;line-height:1.6}.modal-actions{display:flex;gap:10px;margin-top:18px}.modal-actions button{flex:1;border:0;border-radius:13px;padding:13px;font-weight:900}.cancel{background:#e8e8e8}.confirm{background:var(--green);color:#fff}.toast{position:fixed;left:50%;bottom:25px;transform:translate(-50%,20px);opacity:0;background:var(--ink);color:#fff;border-radius:999px;padding:12px 18px;font-weight:900;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:780px){.layout{grid-template-columns:1fr}.menu{grid-template-columns:repeat(2,1fr)}header{padding:14px 16px}.summary{margin:12px 0}}
    html,body{height:100%;overflow:hidden}body{display:grid;grid-template-rows:64px minmax(0,1fr)}header{height:64px;padding:10px 18px}.layout{height:100%;min-height:0;padding:10px;gap:10px;grid-template-columns:minmax(430px,.9fr) minmax(520px,1.1fr);overflow:hidden}.card{min-height:0;padding:12px 14px;border-radius:18px;overflow:hidden}.card h2{font-size:clamp(17px,2vw,24px);margin-bottom:8px}.students{grid-template-columns:repeat(5,1fr);gap:6px}.student{min-height:42px;padding:7px 4px;font-size:clamp(13px,1.4vw,17px)}.summary{margin:9px 0;gap:7px}.metric{padding:8px 11px}.metric strong{font-size:clamp(20px,2.5vw,30px)}.history{max-height:none;overflow:hidden;gap:3px}.history div{padding:4px 2px;font-size:13px}.menu{height:min(52vh,390px);grid-template-rows:repeat(2,minmax(0,1fr));gap:8px}.product{min-height:0;padding:8px;font-size:clamp(15px,1.8vw,21px)}.product span{font-size:clamp(28px,4vw,46px);margin-bottom:2px}.buybar{margin-top:8px;padding-top:8px}.buybar strong{font-size:clamp(19px,2.4vw,30px);color:var(--purple)}.buy{padding:12px 22px}@media(max-height:680px){body{grid-template-rows:54px minmax(0,1fr)}header{height:54px}.layout{padding:7px}.student{min-height:34px}.summary{margin:6px 0}.history div{padding:2px}.menu{height:min(50vh,310px)}}
    .header-side{display:flex;align-items:center;gap:9px;min-width:0}.app-nav{display:flex;gap:5px}.app-nav a{display:flex;align-items:center;justify-content:center;min-height:44px;padding:6px 9px;border:2px solid #ffffff55;border-radius:11px;color:#fff;text-decoration:none;font-size:12px;font-weight:900;white-space:nowrap}.app-nav a[aria-current="page"]{background:#fff;color:var(--purple)}.student,.product,.buy,.modal-actions button{min-height:44px}.student,.product{overflow-wrap:anywhere}.toast{bottom:max(16px,env(safe-area-inset-bottom))}dialog{max-width:calc(100vw - 24px);max-height:calc(100dvh - 24px);overflow:auto}.modal{min-width:0;width:min(420px,88vw);padding-bottom:max(24px,env(safe-area-inset-bottom))}
    @media(max-width:1050px){.app-nav a{width:44px;padding:5px;font-size:0}.app-nav a .nav-icon{font-size:20px}.layout{grid-template-columns:minmax(360px,.9fr) minmax(430px,1.1fr)}}
    @media(max-width:780px){html,body{height:auto;min-height:100%;overflow-x:hidden;overflow-y:auto}body{display:block;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}header{height:auto;min-height:64px;padding:max(8px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) 8px max(10px,env(safe-area-inset-left));gap:8px;flex-wrap:wrap}header h1{font-size:clamp(18px,5.5vw,25px);overflow-wrap:anywhere}.header-side{margin-left:auto}.header-side>span{display:none}.layout{height:auto;min-height:calc(100dvh - 64px);grid-template-columns:1fr;padding:8px max(8px,env(safe-area-inset-right)) max(12px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));overflow:visible}.card{overflow:visible}.students{grid-template-columns:repeat(3,minmax(0,1fr))}.history{max-height:180px;overflow:auto}.menu{height:auto;grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:none}.product{min-height:108px}.buybar{position:relative}.buy{flex:none}.modal-actions button{min-height:48px}}
    @media(max-width:360px){.students{grid-template-columns:repeat(2,minmax(0,1fr))}.menu{grid-template-columns:1fr}.buybar{align-items:stretch;flex-direction:column}.buy{width:100%}}
  </style>
</head>
<body>
  <header><h1>⌨️ 키캡 만들기 부스</h1><div class="header-side"><span id="classLabel"></span><nav class="app-nav" aria-label="시장놀이 화면 이동"><a href="/index.html" data-route="/index.html"><span class="nav-icon">🏠</span><span>메인 키오스크</span></a><a href="/kcap.html" data-route="/kcap.html" aria-current="page"><span class="nav-icon">⌨️</span><span>키캡 부스</span></a><a href="/snack.html" data-route="/snack.html"><span class="nav-icon">🍗</span><span>분식 부스</span></a></nav></div></header>
  <main class="layout">
    <section class="card">
      <h2>1. 학생 이름 선택</h2>
      <div class="students" id="students"></div>
      <div class="summary">
        <div class="metric"><span>현재 잔액</span><strong id="balance">-</strong></div>
        <div class="metric"><span>총 구매금액</span><strong id="total">-</strong></div>
      </div>
      <h2>최근 구매내역</h2>
      <div class="history" id="history"><div class="empty">학생을 선택해 주세요.</div></div>
    </section>
    <section class="card">
      <h2>2. 만들 상품 선택</h2>
      <div class="menu" id="menu"></div>
      <div class="buybar"><strong id="selectedLabel">상품을 선택해 주세요.</strong><button class="buy" id="buy" disabled>결제하기</button></div>
    </section>
  </main>
  <dialog id="confirmDialog"><div class="modal"><h2>구매할까요?</h2><p id="confirmText"></p><div class="modal-actions"><button class="cancel" id="cancelBuy">취소</button><button class="confirm" id="confirmBuy">네, 구매해요!</button></div></div></dialog>
  <div class="toast" id="toast" role="status"></div>

  <script type="module">
    import { classId, createPurchaseId, initializeStudentSource, purchaseFromStudent, subscribeStudents } from './firebase-students.js';
    document.querySelectorAll('[data-route]').forEach(link=>link.href=link.dataset.route+`?classId=${encodeURIComponent(classId)}`);

    const KEY='class-market-kiosk-v2';
    const defaults=['조예빈','천지민','안종웅','황정훈','강지엘','이현','김유진','신승훈','권유준','강하엘','오석민','신율','신차빈'].map((name,id)=>({id,name,balance:20000,history:[]}));
    const products=[{name:'반짝 키캡',price:3500,icon:'✨'},{name:'레인보우 키캡',price:5500,icon:'🌈'},{name:'슈퍼스타 키캡',price:6500,icon:'⭐'},{name:'고양이 키링 만들기',price:3500,icon:'🐱'}];
    const studentsEl=document.querySelector('#students'),balanceEl=document.querySelector('#balance'),totalEl=document.querySelector('#total'),historyEl=document.querySelector('#history'),menu=document.querySelector('#menu'),selectedLabel=document.querySelector('#selectedLabel'),buy=document.querySelector('#buy'),toastEl=document.querySelector('#toast'),confirmDialog=document.querySelector('#confirmDialog'),confirmText=document.querySelector('#confirmText'),confirmBuy=document.querySelector('#confirmBuy');
    document.querySelector('#classLabel').textContent=`학급 ${classId}`;
    let students=[],studentId=null,selected=null,busy=false;
    const money=value=>Number(value).toLocaleString('ko-KR')+'원';
    const escapeHtml=value=>{const div=document.createElement('div');div.textContent=value;return div.innerHTML};
    function readCache(){try{const value=JSON.parse(localStorage.getItem(KEY));if(value?.students?.length===13)return value.students}catch(error){}return defaults}
    function cache(){localStorage.setItem(KEY,JSON.stringify({students}))}
    function toast(message){toastEl.textContent=message;toastEl.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>toastEl.classList.remove('show'),2200)}
    function current(){return students.find(student=>student.id===studentId)||null}
    function applyStudents(next){students=next;cache();if(studentId!==null&&!current())studentId=null;render()}
    function render(){
      const student=current();
      studentsEl.innerHTML=students.length?students.map(item=>`<button class="student${item.id===studentId?' active':''}" data-id="${item.id}">${escapeHtml(item.name)}</button>`).join(''):'<div class="empty">학생 데이터를 불러오는 중입니다.</div>';
      balanceEl.textContent=student?money(student.balance):'-';
      totalEl.textContent=student?money(student.totalSpent||0):'-';
      historyEl.innerHTML=student?(student.history.length?student.history.slice().reverse().slice(0,8).map(item=>`<div><span>${escapeHtml(item.item)}</span><b>${item.amount<0?'+':'-'}${money(Math.abs(item.amount))}</b></div>`).join(''):'<div class="empty">구매내역이 없습니다.</div>'):'<div class="empty">학생을 선택해 주세요.</div>';
      selectedLabel.textContent=selected?`${selected.name} · ${money(selected.price)}`:'상품을 선택해 주세요.';
      buy.disabled=!student||!selected||busy;
    }
    menu.innerHTML=products.map((item,index)=>`<button class="product" data-index="${index}"><span>${item.icon}</span>${item.name}<br>${money(item.price)}</button>`).join('');
    studentsEl.addEventListener('click',event=>{const button=event.target.closest('[data-id]');if(!button)return;studentId=button.dataset.id;render()});
    menu.addEventListener('click',event=>{const button=event.target.closest('[data-index]');if(!button)return;selected=products[Number(button.dataset.index)];menu.querySelectorAll('.product').forEach(item=>item.classList.toggle('selected',item===button));render()});
    buy.addEventListener('click',()=>{const student=current(),item=selected;if(!student||!item||busy)return;if(item.price>student.balance){toast('잔액이 부족합니다.');return}confirmText.innerHTML=`<b>${escapeHtml(student.name)}</b> 학생이<br><b>${escapeHtml(item.name)} · ${money(item.price)}</b>을 구매합니다.`;confirmDialog.showModal()});
    document.querySelector('#cancelBuy').addEventListener('click',()=>confirmDialog.close());
    confirmBuy.addEventListener('click',async()=>{const student=current(),item=selected;if(!student||!item||busy)return;busy=true;confirmBuy.disabled=true;render();const purchasedAt=Date.now(),purchaseId=createPurchaseId('keycap',student.id),category=item.name.includes('키링')?'키링 만들기':'키캡 만들기';try{const result=await purchaseFromStudent({classId,purchaseId,studentId:String(student.id),studentName:student.name,itemName:item.name,category,quantity:1,amount:item.price,purchasedAt,booth:'keycap'});if(!result.committed){console.error('[Keycap purchase aborted]',{...result.context,reason:result.reason,balance:student.balance});toast(`결제 실패(${result.context?.stage||'unknown'}): ${result.reason}`);return}applyStudents(result.students);selected=null;menu.querySelectorAll('.product').forEach(product=>product.classList.remove('selected'));confirmDialog.close();toast('구매가 완료되었습니다');}catch(error){console.error('[Keycap Firebase error]',{code:error?.code,message:error?.message,context:error?.paymentContext,error});toast(`Firebase 오류: ${error?.code||'unknown'} · ${error?.message||''}`)}finally{busy=false;confirmBuy.disabled=false;render()}});
    try{applyStudents(await initializeStudentSource(readCache(),defaults));subscribeStudents(applyStudents,error=>{console.error(error);toast('Firebase 연결을 확인해 주세요.')})}catch(error){console.error(error);students=readCache();render();toast('오프라인 백업 데이터를 표시합니다.')}
  </script>
</body>
</html>
