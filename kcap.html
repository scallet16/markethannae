<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>키캡 만들기 부스</title>
  <style>
    :root{--ink:#252525;--purple:#7654c8;--yellow:#ffd84d;--cream:#fff9ec;--line:#ded5ef;--green:#198754}*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font-family:"Noto Sans KR",system-ui,sans-serif}button{font:inherit;cursor:pointer}header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;background:var(--purple);color:#fff}header h1{margin:0;font-size:clamp(23px,3vw,36px)}header span{font-weight:800;color:#fff4a8}.layout{display:grid;grid-template-columns:minmax(270px,.8fr) minmax(420px,1.2fr);gap:16px;padding:16px;min-height:calc(100vh - 78px)}.card{background:#fff;border:2px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 8px 24px #58428018}.card h2{margin:0 0 14px}.students{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:9px}.student{border:2px solid var(--ink);border-radius:14px;background:#fff;padding:13px 7px;font-weight:900}.student.active{background:var(--yellow)}.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0}.metric{border-radius:16px;background:#f5f0ff;padding:14px}.metric span{display:block;color:#685e78;font-size:13px}.metric strong{font-size:clamp(22px,3vw,34px)}.menu{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.product{border:3px solid var(--line);border-radius:18px;background:#fff;padding:18px 10px;font-weight:900;font-size:18px}.product span{display:block;font-size:38px;margin-bottom:5px}.product.selected{border-color:var(--purple);background:#f5f0ff}.buybar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:15px;padding-top:15px;border-top:2px solid var(--line)}.buy{border:0;border-radius:14px;background:var(--green);color:#fff;padding:14px 22px;font-weight:1000;font-size:18px}.buy:disabled{opacity:.4;cursor:not-allowed}.history{display:grid;gap:7px;max-height:220px;overflow:auto;margin-top:12px}.history div{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:7px 2px}.empty{text-align:center;color:#777;padding:24px 6px}.toast{position:fixed;left:50%;bottom:25px;transform:translate(-50%,20px);opacity:0;background:var(--ink);color:#fff;border-radius:999px;padding:12px 18px;font-weight:900;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:780px){.layout{grid-template-columns:1fr}.menu{grid-template-columns:repeat(2,1fr)}header{padding:14px 16px}.summary{margin:12px 0}}
  </style>
</head>
<body>
  <header><h1>⌨️ 키캡 만들기 부스</h1><span id="classLabel"></span></header>
  <main class="layout">
    <section class="card">
      <h2>1. 학생 이름 선택</h2>
      <div class="students" id="students"></div>
      <div class="summary">
        <div class="metric"><span>현재 잔액</span><strong id="balance">-</strong></div>
        <div class="metric"><span>총 구매금액</span><strong id="total">-</strong></div>
      </div>
      <h2>최근 구매내역</h2>
      <div class="history" id="history"><div class="empty">학생을 선택해 주세요.</div></div>
    </section>
    <section class="card">
      <h2>2. 만들 상품 선택</h2>
      <div class="menu" id="menu"></div>
      <div class="buybar"><strong id="selectedLabel">상품을 선택해 주세요.</strong><button class="buy" id="buy" disabled>결제하기</button></div>
    </section>
  </main>
  <div class="toast" id="toast" role="status"></div>

  <script type="module">
    import { classId, initializeStudentSource, purchaseFromStudent, subscribeStudents } from './firebase-students.js';

    const KEY='class-market-kiosk-v2';
    const defaults=['조예빈','천지민','안종웅','황정훈','강지엘','이현','김유진','신승훈','권유준','강하엘','오석민','신율','신차빈'].map((name,id)=>({id,name,balance:20000,history:[]}));
    const products=[{name:'반짝 키캡',price:3500,icon:'✨'},{name:'레인보우 키캡',price:5500,icon:'🌈'},{name:'슈퍼스타 키캡',price:6500,icon:'⭐'},{name:'고양이 키링 만들기',price:3500,icon:'🐱'}];
    const studentsEl=document.querySelector('#students'),balanceEl=document.querySelector('#balance'),totalEl=document.querySelector('#total'),historyEl=document.querySelector('#history'),menu=document.querySelector('#menu'),selectedLabel=document.querySelector('#selectedLabel'),buy=document.querySelector('#buy'),toastEl=document.querySelector('#toast');
    document.querySelector('#classLabel').textContent=`학급 ${classId}`;
    let students=[],studentId=null,selected=null,busy=false;
    const money=value=>Number(value).toLocaleString('ko-KR')+'원';
    const escapeHtml=value=>{const div=document.createElement('div');div.textContent=value;return div.innerHTML};
    function readCache(){try{const value=JSON.parse(localStorage.getItem(KEY));if(value?.students?.length===13)return value.students}catch(error){}return defaults}
    function cache(){localStorage.setItem(KEY,JSON.stringify({students}))}
    function toast(message){toastEl.textContent=message;toastEl.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>toastEl.classList.remove('show'),2200)}
    function current(){return students.find(student=>student.id===studentId)||null}
    function applyStudents(next){students=next;cache();if(studentId!==null&&!current())studentId=null;render()}
    function render(){
      const student=current();
      studentsEl.innerHTML=students.length?students.map(item=>`<button class="student${item.id===studentId?' active':''}" data-id="${item.id}">${escapeHtml(item.name)}</button>`).join(''):'<div class="empty">학생 데이터를 불러오는 중입니다.</div>';
      balanceEl.textContent=student?money(student.balance):'-';
      totalEl.textContent=student?money(student.history.reduce((sum,item)=>sum+(item.amount>0?item.amount:0),0)):'-';
      historyEl.innerHTML=student?(student.history.length?student.history.slice().reverse().slice(0,8).map(item=>`<div><span>${escapeHtml(item.item)}</span><b>${item.amount<0?'+':'-'}${money(Math.abs(item.amount))}</b></div>`).join(''):'<div class="empty">구매내역이 없습니다.</div>'):'<div class="empty">학생을 선택해 주세요.</div>';
      selectedLabel.textContent=selected?`${selected.name} · ${money(selected.price)}`:'상품을 선택해 주세요.';
      buy.disabled=!student||!selected||busy;
    }
    menu.innerHTML=products.map((item,index)=>`<button class="product" data-index="${index}"><span>${item.icon}</span>${item.name}<br>${money(item.price)}</button>`).join('');
    studentsEl.addEventListener('click',event=>{const button=event.target.closest('[data-id]');if(!button)return;studentId=Number(button.dataset.id);render()});
    menu.addEventListener('click',event=>{const button=event.target.closest('[data-index]');if(!button)return;selected=products[Number(button.dataset.index)];menu.querySelectorAll('.product').forEach(item=>item.classList.toggle('selected',item===button));render()});
    buy.addEventListener('click',async()=>{const student=current(),item=selected;if(!student||!item||busy)return;if(item.price>student.balance){toast('잔액이 부족합니다.');return}busy=true;render();const paidAt=Date.now(),purchaseId=`keycap_${student.id}_${paidAt}_${Math.random().toString(36).slice(2,10)}`;try{const result=await purchaseFromStudent({purchaseId,studentId:student.id,studentName:student.name,menuName:item.name,quantity:1,totalAmount:item.price,paidAt,booth:'keycap'});if(!result.committed){toast(result.reason==='insufficient'?'잔액이 부족합니다.':'결제를 다시 확인해 주세요.');return}applyStudents(result.students);selected=null;menu.querySelectorAll('.product').forEach(product=>product.classList.remove('selected'));toast('키캡 결제가 완료되었습니다.')}catch(error){console.error(error);toast('Firebase 연결을 확인해 주세요.')}finally{busy=false;render()}});
    try{applyStudents(await initializeStudentSource(readCache(),defaults));subscribeStudents(applyStudents,error=>{console.error(error);toast('Firebase 연결을 확인해 주세요.')})}catch(error){console.error(error);students=readCache();render();toast('오프라인 백업 데이터를 표시합니다.')}
  </script>
</body>
</html>
