<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>분식점 주문·대기</title>
  <style>
    :root{--ink:#252525;--cream:#fff8e8;--yellow:#ffd84d;--green:#1f8a5b;--red:#d84c4c;--line:#e8dcc5}*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font-family:"Noto Sans KR",system-ui,sans-serif}button{font:inherit;cursor:pointer}header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;background:var(--ink);color:#fff}header h1{margin:0;font-size:clamp(22px,3vw,34px)}header span{color:var(--yellow);font-weight:800}.layout{display:grid;grid-template-columns:minmax(290px,.85fr) minmax(380px,1.15fr);gap:16px;padding:16px;min-height:calc(100vh - 76px)}.card{background:#fff;border:2px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 8px 22px #5c452018}.card h2{margin:0 0 14px}.student-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:9px}.student{border:2px solid var(--ink);border-radius:14px;background:#fff;padding:14px 8px;font-weight:900}.student.active{background:var(--yellow)}.empty{padding:28px 10px;text-align:center;color:#777}.paid-list,.queue{display:grid;gap:10px}.order{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;border:2px solid var(--line);border-radius:16px;padding:13px}.order b{display:block;font-size:18px}.order small{display:block;color:#777;margin-top:4px}.register,.call,.recall,.complete,.undo{border:0;border-radius:12px;padding:11px 14px;color:#fff;font-weight:900}.register{background:var(--green)}.queue-card{display:grid;grid-template-columns:64px 1fr auto;gap:12px;align-items:center;border:3px solid var(--ink);border-radius:18px;padding:14px;background:#fff}.number{display:grid;place-items:center;width:56px;height:56px;border-radius:50%;background:var(--yellow);font-size:25px;font-weight:1000}.actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}.call{background:#315fba}.recall{background:#7950a8}.complete{background:var(--green)}.undo{background:#7950a8}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}dialog{border:0;border-radius:24px;padding:0;box-shadow:0 18px 55px #0005}dialog::backdrop{background:#0008}.wait-result{min-width:min(420px,88vw);padding:28px;text-align:center}.wait-result strong{display:block;font-size:80px;color:#b13b25}.wait-result button{border:0;border-radius:14px;background:var(--ink);color:#fff;padding:13px 30px;font-weight:900}.notice{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);opacity:0;background:var(--ink);color:#fff;padding:12px 18px;border-radius:999px;font-weight:800;transition:.2s;pointer-events:none}.notice.show{opacity:1;transform:translate(-50%,0)}@media(max-width:800px){.layout{grid-template-columns:1fr}.queue-card{grid-template-columns:54px 1fr}.queue-card .actions{grid-column:1/-1}.actions button{flex:1}}
    html,body{height:100%;overflow:hidden}body{display:grid;grid-template-rows:64px minmax(0,1fr)}header{height:64px;padding:10px 18px}.layout{height:100%;min-height:0;padding:10px;gap:10px;grid-template-columns:minmax(430px,.9fr) minmax(540px,1.1fr);overflow:hidden}.card{min-height:0;padding:12px 14px;border-radius:18px;overflow:hidden}.card h2{font-size:clamp(17px,2vw,24px);margin-bottom:8px}.student-grid{grid-template-columns:repeat(5,1fr);gap:6px}.student{min-height:42px;padding:7px 4px;font-size:clamp(13px,1.4vw,17px)}.paid-list,.queue{gap:6px}.order{padding:8px 10px}.order b{font-size:16px}.queue-card{grid-template-columns:50px 1fr auto;gap:8px;padding:8px;border-width:2px}.number{width:46px;height:46px;font-size:22px}.actions{gap:4px}.actions button,.register,.undo{padding:8px 10px;font-size:13px}.toolbar{margin-bottom:8px}.empty{padding:16px 6px}@media(max-height:680px){body{grid-template-rows:54px minmax(0,1fr)}header{height:54px}.layout{padding:7px}.student{min-height:34px}.queue-card{padding:5px}.number{width:40px;height:40px}.actions button{padding:6px 8px}}
    .header-side{display:flex;align-items:center;gap:9px;min-width:0}.app-nav{display:flex;gap:5px}.app-nav a{display:flex;align-items:center;justify-content:center;min-height:44px;padding:6px 9px;border:2px solid #ffffff55;border-radius:11px;color:#fff;text-decoration:none;font-size:12px;font-weight:900;white-space:nowrap}.app-nav a[aria-current="page"]{background:var(--yellow);color:var(--ink);border-color:var(--yellow)}.student,.register,.call,.recall,.complete,.undo,.wait-result button{min-height:44px}.student,.order,.queue-card{min-width:0;overflow-wrap:anywhere}.notice{bottom:max(16px,env(safe-area-inset-bottom));max-width:calc(100vw - 24px)}dialog{max-width:calc(100vw - 24px);max-height:calc(100dvh - 24px);overflow:auto}.wait-result{min-width:0;width:min(420px,88vw);padding-bottom:max(28px,env(safe-area-inset-bottom))}
    @media(max-width:1050px){.app-nav a{width:44px;padding:5px;font-size:0}.app-nav a .nav-icon{font-size:20px}.layout{grid-template-columns:minmax(360px,.9fr) minmax(430px,1.1fr)}}
    @media(max-width:800px){html,body{height:auto;min-height:100%;overflow-x:hidden;overflow-y:auto}body{display:block;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}header{height:auto;min-height:64px;padding:max(8px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) 8px max(10px,env(safe-area-inset-left));gap:8px;flex-wrap:wrap}header h1{font-size:clamp(18px,5.5vw,25px);overflow-wrap:anywhere}.header-side{margin-left:auto}.header-side>span{display:none}.layout{height:auto;min-height:calc(100dvh - 64px);grid-template-columns:1fr;padding:8px max(8px,env(safe-area-inset-right)) max(12px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));overflow:visible}.card{overflow:visible}.student-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.paid-list,.queue{max-height:none}.order{grid-template-columns:minmax(0,1fr) auto}.queue-card{grid-template-columns:48px minmax(0,1fr)}.queue-card .actions{grid-column:1/-1}.actions button{flex:1;min-width:96px}.toolbar{align-items:flex-start}.toolbar h2{min-width:0}.undo{flex:none}}
    @media(max-width:360px){.student-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.order{grid-template-columns:1fr}.register{width:100%}.toolbar{flex-direction:column}.undo{width:100%}.actions{display:grid;grid-template-columns:1fr}.actions button{width:100%}}
  </style>
</head>
<body>
  <header><h1>🍗 분식점 주문·대기</h1><div class="header-side"><span id="classLabel"></span><nav class="app-nav" aria-label="시장놀이 화면 이동"><a href="/index.html" data-route="/index.html"><span class="nav-icon">🏠</span><span>메인 키오스크</span></a><a href="/kcap.html" data-route="/kcap.html"><span class="nav-icon">⌨️</span><span>키캡 부스</span></a><a href="/snack.html" data-route="/snack.html" aria-current="page"><span class="nav-icon">🍗</span><span>분식 부스</span></a></nav></div></header>
  <main class="layout">
    <section class="card">
      <h2>1. 내 이름을 선택하세요</h2>
      <div class="student-grid" id="studentGrid"></div>
      <h2 id="paidTitle" style="margin-top:22px">2. 결제한 메뉴를 확인하세요</h2>
      <div class="paid-list" id="paidList"><div class="empty">이름을 선택해 주세요.</div></div>
    </section>
    <section class="card">
      <div class="toolbar"><h2>현재 대기 주문</h2><button class="undo" id="undoBtn" disabled>최근 완료 되돌리기</button></div>
      <div class="queue" id="queue"></div>
    </section>
  </main>
  <dialog id="waitDialog"><div class="wait-result"><h2>대기 등록 완료</h2><p>내 대기번호는</p><strong id="waitNumber"></strong><p>화면에서 번호를 확인해 주세요.</p><button id="closeWait">확인</button></div></dialog>
  <div class="notice" id="notice" role="status"></div>

  <script type="module">
    import { classId, completeWaiting, registerWaiting, subscribeSnack, undoLatestCompleted } from './firebase-snack.js';
    import { classId as studentsClassId, subscribeStudents } from './firebase-students.js';
    document.querySelectorAll('[data-route]').forEach(link=>link.href=link.dataset.route+`?classId=${encodeURIComponent(classId)}`);

    const studentGrid=document.querySelector('#studentGrid'),paidList=document.querySelector('#paidList'),paidTitle=document.querySelector('#paidTitle'),queue=document.querySelector('#queue'),undoBtn=document.querySelector('#undoBtn'),notice=document.querySelector('#notice'),waitDialog=document.querySelector('#waitDialog'),waitNumber=document.querySelector('#waitNumber');
    document.querySelector('#classLabel').textContent=`학급 ${classId}`;
    let state={purchases:[],waiting:[],completed:[]},studentRoster=[],selectedStudentId=null,busy=false;
    const esc=value=>{const div=document.createElement('div');div.textContent=value;return div.innerHTML};
    const date=value=>new Date(value).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const money=value=>Number(value).toLocaleString('ko-KR')+'원';
    function toast(message){notice.textContent=message;notice.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>notice.classList.remove('show'),2200)}
    function paidPurchases(){return state.purchases.filter(item=>item.status==='paid')}
    function render(){
      const paid=paidPurchases();
      if(selectedStudentId!==null&&!studentRoster.some(item=>String(item.id)===selectedStudentId))selectedStudentId=null;
      studentGrid.innerHTML=studentRoster.length?studentRoster.map(item=>`<button class="student${String(item.id)===selectedStudentId?' active':''}" data-student-id="${esc(String(item.id))}">${esc(item.name)}</button>`).join(''):'<div class="empty">학생 정보를 불러오는 중입니다.</div>';
      const selected=paid.filter(item=>String(item.studentId)===selectedStudentId);
      const selectedStudent=studentRoster.find(item=>String(item.id)===selectedStudentId);
      paidTitle.textContent=selectedStudentId===null?'2. 결제한 메뉴를 확인하세요':`2. ${selectedStudent?.name||''} 결제 메뉴`;
      paidList.innerHTML=selectedStudentId===null?'<div class="empty">이름을 선택해 주세요.</div>':selected.length?selected.map(item=>`<article class="order"><div><b>${esc(item.itemName)} × ${item.quantity}</b><small>${money(item.amount)} · 결제 ${date(item.purchasedAt)}</small></div><button class="register" data-purchase-id="${esc(item.purchaseId)}">대기 등록</button></article>`).join(''):'<div class="empty">등록 가능한 결제 내역이 없습니다.</div>';
      queue.innerHTML=state.waiting.length?state.waiting.map((item,index)=>`<article class="queue-card"><div class="number">${index+1}</div><div><b>${esc(item.studentName)} · ${esc(item.itemName)} × ${item.quantity}</b><small>주문 ${date(item.registeredAt)} · 상태: waiting</small></div><div class="actions"><button class="call" data-call-id="${esc(item.purchaseId)}">호출</button><button class="recall" data-recall-id="${esc(item.purchaseId)}">다시 호출</button><button class="complete" data-complete-id="${esc(item.purchaseId)}">전달 완료</button></div></article>`).join(''):'<div class="empty">현재 대기 중인 주문이 없습니다.</div>';
      undoBtn.disabled=!state.completed.length||busy;
    }
    function speak(item,index){if(!('speechSynthesis'in window)){toast('이 브라우저에서는 음성 호출을 지원하지 않습니다.');return}speechSynthesis.cancel();const utterance=new SpeechSynthesisUtterance(`${item.studentName} 학생, 분식을 받아가세요.`);utterance.lang='ko-KR';utterance.rate=.88;utterance.pitch=1;speechSynthesis.speak(utterance);toast(`대기 ${index+1}번 ${item.studentName} 학생을 호출했습니다.`)}
    studentGrid.addEventListener('click',event=>{const button=event.target.closest('[data-student-id]');if(!button)return;selectedStudentId=button.dataset.studentId;render()});
    paidList.addEventListener('click',async event=>{const button=event.target.closest('[data-purchase-id]');if(!button||busy)return;busy=true;button.disabled=true;try{const result=await registerWaiting(button.dataset.purchaseId);if(result.committed){const index=result.waiting.findIndex(item=>item.purchaseId===button.dataset.purchaseId);waitNumber.textContent=`${index+1}번`;waitDialog.showModal()}else toast(result.reason==='duplicate'?'이미 대기 등록된 주문입니다.':'대기 등록할 수 없는 주문입니다.')}catch(error){console.error(error);toast('Firebase 연결을 확인해 주세요.')}finally{busy=false;render()}});
    document.querySelector('#closeWait').addEventListener('click',()=>waitDialog.close());
    queue.addEventListener('click',async event=>{const call=event.target.closest('[data-call-id]'),recall=event.target.closest('[data-recall-id]'),complete=event.target.closest('[data-complete-id]');if(call||recall){const purchaseId=(call||recall).dataset.callId||(call||recall).dataset.recallId,index=state.waiting.findIndex(item=>item.purchaseId===purchaseId);if(index>=0)speak(state.waiting[index],index);return}if(!complete||busy)return;busy=true;complete.disabled=true;try{const result=await completeWaiting(complete.dataset.completeId);toast(result.committed?'전달 완료 처리했습니다.':'이미 처리된 주문입니다.')}catch(error){console.error(error);toast('Firebase 연결을 확인해 주세요.')}finally{busy=false;render()}});
    undoBtn.addEventListener('click',async()=>{if(busy)return;busy=true;undoBtn.disabled=true;try{const result=await undoLatestCompleted();toast(result.committed?`${result.restored.studentName} 주문을 대기 목록으로 되돌렸습니다.`:'되돌릴 주문이 없습니다.')}catch(error){console.error(error);toast('Firebase 연결을 확인해 주세요.')}finally{busy=false;render()}});
    subscribeSnack(next=>{state=next;render()},error=>{console.error(error);toast('Firebase 연결을 확인해 주세요.')});
    if(studentsClassId!==classId)console.error('학생 데이터와 분식 데이터의 classId가 일치하지 않습니다.');
    subscribeStudents(next=>{studentRoster=next;render()},error=>{console.error(error);toast('학생 정보를 불러오지 못했습니다.')});
    render();
  </script>
</body>
</html>
